<div class="login-page">
  <div class="login-card">
    <h2 class="logo">time<span>2</span>book.me</h2>

    <!-- Tab switcher -->
    <div class="mode-tabs">
      <button [class.active]="mode === 'login'"    (click)="setMode('login')">เข้าสู่ระบบ</button>
      <button [class.active]="mode === 'register'" (click)="setMode('register')">สมัครสมาชิก</button>
    </div>

    <div class="error-msg"   *ngIf="errorMsg">{{ errorMsg }}</div>
    <div class="success-msg" *ngIf="successMsg">{{ successMsg }}</div>

    <!-- Login Form -->
    <div *ngIf="mode === 'login'">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="กรอก email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" placeholder="กรอก password" />
      </div>
      <button class="btn-submit" (click)="login()" [disabled]="isLoading">
        {{ isLoading ? 'กำลังเข้าสู่ระบบ...' : 'เข้าสู่ระบบ' }}
      </button>
      <p class="switch-text">
        ยังไม่มีบัญชี?
        <span (click)="setMode('register')">สมัครสมาชิก</span>
      </p>
    </div>

    <!-- Register Form -->
    <div *ngIf="mode === 'register'">
      <div class="form-group">
        <label>Username</label>
        <input type="text" [(ngModel)]="username" placeholder="กรอก username" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" placeholder="กรอก email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" [(ngModel)]="password" placeholder="อย่างน้อย 6 ตัวอักษร" />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" [(ngModel)]="confirmPassword" placeholder="กรอก password อีกครั้ง" />
      </div>
      <button class="btn-submit" (click)="register()" [disabled]="isLoading">
        {{ isLoading ? 'กำลังสมัคร...' : 'สมัครสมาชิก' }}
      </button>
      <p class="switch-text">
        มีบัญชีแล้ว?
        <span (click)="setMode('login')">เข้าสู่ระบบ</span>
      </p>
    </div>

  </div>
</div>
